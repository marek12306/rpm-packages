name: Auto update all specs

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if the version has not changed'
        required: false
        type: boolean
        default: false

jobs:
  update-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write 

    steps:
      - name: Clone code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Run update script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: ./scripts/update-packages.sh
